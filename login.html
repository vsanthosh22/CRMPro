<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In — CRMPro</title>
    <meta name="description" content="Sign in to your CRMPro workspace." />

    <script src="js/theme.js"></script>

    <link rel="stylesheet" href="css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/theme.css" />
    <link rel="stylesheet" href="css/components.css" />

</head>
<body>

    <a class="crm-skip" href="#login-form">Skip to sign-in form</a>

    <div class="crm-bg-layer" aria-hidden="true">
        <div class="crm-orb crm-orb-1"></div>
        <div class="crm-orb crm-orb-2"></div>
    </div>

    <button class="crm-theme-toggle"
            id="crm-theme-btn"
            type="button"
            aria-label="Switch to light theme"
            aria-pressed="false">
        <svg class="icon-moon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
        </svg>
        <svg class="icon-sun" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="5" />
            <line x1="12" y1="1" x2="12" y2="3" />
            <line x1="12" y1="21" x2="12" y2="23" />
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
            <line x1="1" y1="12" x2="3" y2="12" />
            <line x1="21" y1="12" x2="23" y2="12" />
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
        </svg>
    </button>

    <div class="crm-toast" id="crm-toast" role="status" aria-live="polite" aria-atomic="true">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" aria-hidden="true">
            <polyline points="20 6 9 17 4 12" />
        </svg>
        <span id="crm-toast-text"></span>
    </div>

    <div id="crm-live-polite" class="crm-sr-live" aria-live="polite" aria-atomic="true"></div>
    <div id="crm-live-urgent" class="crm-sr-live" aria-live="assertive" aria-atomic="true"></div>

    <main id="main-content" class="crm-page-wrap">
        <div class="crm-card" role="region" aria-labelledby="login-title">

            <a href="#" class="crm-brand" aria-label="CRMPro — homepage">
                <div class="crm-brand-mark" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#c9a84c" stroke-width="1.8" aria-hidden="true">
                        <path d="M12 2L2 7l10 5 10-5-10-5z" />
                        <path d="M2 17l10 5 10-5" />
                        <path d="M2 12l10 5 10-5" />
                    </svg>
                </div>
                <span class="crm-brand-name">CRM<span>Pro</span></span>
            </a>

            <div class="crm-heading">
                <h1 id="login-title">Welcome back</h1>
                <p>Sign in to your workspace to continue.</p>
            </div>
            <div class="crm-rule" aria-hidden="true"></div>

            <form id="login-form" novalidate aria-label="Sign-in form">

                <div class="crm-field" id="field-login-email">
                    <label for="login-email">Email address</label>
                    <div class="crm-input-shell">
                        <span class="crm-input-icon" aria-hidden="true">
                            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                                <rect x="2" y="4" width="20" height="16" rx="3" />
                                <path d="M2 8l10 6 10-6" />
                            </svg>
                        </span>
                        <input type="email" id="login-email" name="email"
                               autocomplete="email" placeholder="you@company.com"
                               aria-required="true" aria-describedby="login-email-error" />
                    </div>
                    <span id="login-email-error" class="crm-error-msg" role="alert" aria-live="assertive">
                        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24" aria-hidden="true">
                            <circle cx="12" cy="12" r="10" />
                            <line x1="12" y1="8" x2="12" y2="12" />
                            <line x1="12" y1="16" x2="12.01" y2="16" />
                        </svg>
                        <span data-msg>Please enter a valid email address.</span>
                    </span>
                </div>

                <div class="crm-field" id="field-login-password">
                    <label for="login-password">Password</label>
                    <div class="crm-input-shell">
                        <span class="crm-input-icon" aria-hidden="true">
                            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                                <rect x="3" y="11" width="18" height="11" rx="2" />
                                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                            </svg>
                        </span>
                        <input type="password" id="login-password" name="password"
                               autocomplete="current-password" placeholder="••••••••"
                               aria-required="true" aria-describedby="login-password-error" />
                        <button type="button" class="crm-pw-btn" id="login-pw-toggle"
                                aria-label="Show password" aria-pressed="false">
                            <svg id="icon-eye-open" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                            <svg id="icon-eye-closed" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24" aria-hidden="true" style="display:none">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                                <line x1="1" y1="1" x2="23" y2="23" />
                            </svg>
                        </button>
                    </div>
                    <span id="login-password-error" class="crm-error-msg" role="alert" aria-live="assertive">
                        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24" aria-hidden="true">
                            <circle cx="12" cy="12" r="10" />
                            <line x1="12" y1="8" x2="12" y2="12" />
                            <line x1="12" y1="16" x2="12.01" y2="16" />
                        </svg>
                        <span data-msg>Password must be at least 8 characters.</span>
                    </span>
                </div>

                <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-4">
                    <label class="crm-check">
                        <input type="checkbox" id="login-remember" name="remember" autocomplete="off" />
                        <span class="crm-check-box" aria-hidden="true">
                            <svg class="crm-tick" width="10" height="10" fill="none" stroke="#1a1200" stroke-width="2.5" viewBox="0 0 24 24" aria-hidden="true">
                                <polyline points="20 6 9 17 4 12" />
                            </svg>
                        </span>
                        <span>Keep me signed in</span>
                    </label>
                    <a href="forgot-password.html" class="crm-link" style="font-size:13.5px">Forgot password?</a>
                </div>

                <button type="submit" class="crm-btn-primary" id="login-submit">
                    <span class="crm-btn-inner">Sign in</span>
                    <span class="crm-btn-loader" aria-hidden="true"><div class="crm-ring"></div></span>
                </button>

            </form>

            <p class="crm-footer-help">
                Need access?
                <button type="button" class="crm-link"
                        onclick="CRMUtils.showToast('Contact your organisation admin to create an account.','info')">
                    Request an account
                </button>
            </p>

        </div>
    </main>

    <script src="js/bootstrap.min.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
